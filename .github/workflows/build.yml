name: Build MHR firmware

on:
  push:
    branches: [ main, mhr ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - heltec_v4_repeater              # Hauptziel: MHR-Repeater (Stufe A + Best-of-N aktiv)
          - heltec_v4_companion_radio_usb   # teilt den geänderten Mesh-Kern (DV/Best-of-N base-OFF)
          - heltec_v4_room_server           # teilt CommonCLI-Prefs + Mesh-Kern
          # weitere Ziele bei Bedarf einkommentieren:
          # - heltec_v4_sensor
          # - heltec_v4_companion_radio_ble
          # - heltec_v3_repeater
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}
      - name: Install esptool
        run: pip install esptool
      - name: Collect binaries
        run: |
          mkdir -p artifacts
          B=.pio/build/${{ matrix.env }}
          cp "$B/firmware.bin"   "artifacts/${{ matrix.env }}-firmware.bin"
          cp "$B/bootloader.bin" "artifacts/${{ matrix.env }}-bootloader.bin"
          cp "$B/partitions.bin" "artifacts/${{ matrix.env }}-partitions.bin"
          # Factory-Image (direkt @0x0 flashbar) via esptool merge.
          # boot_app0.bin @0xe000 (otadata) ist zwingend, sonst bootet der App-Slot nicht.
          BOOTAPP=$(find "$HOME/.platformio/packages" -name "boot_app0.bin" 2>/dev/null | head -1)
          if [ -z "$BOOTAPP" ]; then
            echo "ERROR: boot_app0.bin not found" && exit 1
          fi
          echo "Using boot_app0: $BOOTAPP"
          python -m esptool --chip esp32s3 merge_bin \
            -o "artifacts/${{ matrix.env }}-factory.bin" \
            0x0     "$B/bootloader.bin" \
            0x8000  "$B/partitions.bin" \
            0xe000  "$BOOTAPP" \
            0x10000 "$B/firmware.bin"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.env }}
          path: artifacts/
